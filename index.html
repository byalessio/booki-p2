<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Booki</title>
</head>
<body>

    <header>
        <img src="images/logo/Booki.png" alt="Logo du site" class="logo">
        <nav>
            <ul>
                <li><a href="#">Hébergements</a></li>
                <li><a href="#">Activités</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>Trouvez votre hébergement pour des vacances de rêve</h1>
            <p>En plein centre-ville ou en pleine nature</p>

            <form class="search-bar" action="#" method="post">
                <label for="recherche" class="icon-left">
                    <i class="fa-solid fa-location-dot"></i>
                </label>

                <input type="text" id="recherche" name="destination" placeholder="Marseille, France">
                
                <button type="submit" class="btn-desktop">Rechercher</button>
                <button type="submit" class="btn-mobile">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>

            <div class="filtres">
                <span>Filtres</span>
                <ul class="filter-list">
                    <li>
                        <button type="button" class="filtres-btn">
                            <span class="icon">
                                <i class="fa-solid fa-money-bill-wave"></i>
                            </span>
                            Économique
                        </button>
                    </li>
                    <li>
                        <button type="button" class="filtres-btn">
                            <span class="icon">
                                <i class="fa-solid fa-person"></i>
                            </span>
                            Familial
                        </button>
                    </li>
                    <li>
                        <button type="button" class="filtres-btn">
                            <span class="icon">
                                <i class="fa-solid fa-heart"></i>
                            </span>
                            Romantique
                        </button>
                    </li>
                    <li>
                        <button type="button" class="filtres-btn">
                            <span class="icon">
                                <i class="fa-solid fa-fire"></i>
                            </span>
                            Nos pépites
                        </button>
                    </li>
                </ul>
            </div>
            <p class="info">
                <span class="info-btn">
                    <i class="fa-solid fa-info"></i>
                </span>
                Plus de 500 logements sont disponibles dans cette ville
            </p>
        </section>

    </main>

</body>
</html>
